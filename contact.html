    <style>
        body {
            padding-top: 5vh;
        }

        h1 {
            margin-top: 0px;
            color: #333;
        }
        .contact-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            width: 80%;
            max-width: 1000px;
        }

        .contact-box {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 320px;
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease; /* 添加平滑过渡效果 */
        }

        .contact-box:hover {
            transform: translateY(-10px); /* 鼠标悬停时上浮 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); /* 增加阴影效果 */
        }

        .contact-box h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
        }

        .contact-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .contact-box li {
            margin-bottom: 10px;
            font-size: 1em;
            color: #333;
            display: flex;
            align-items: center;
        }

        .contact-box i {
            margin-right: 10px;
            font-size: 1.2em;
            color: #333;
        }

        .contact-box a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            padding: 5px 8px;
            border-radius: 8px;
        }

        .contact-box a:hover {
            color: rgb(0, 195, 255);
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
    </style>
